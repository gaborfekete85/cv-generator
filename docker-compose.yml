# docker compose up
#
# Mounts data/ and output/ from the host so you can edit your profile
# without rebuilding the image, and so generated PDFs show up in the host's
# output/ folder. The CV template (backend/cv_template.md) is intentionally
# baked into the image — see the volumes section below.

services:
  cv-generator:
    build: .
    image: cv-generator:latest
    container_name: cv-generator
    ports:
      - "8000:8000"
    volumes:
      # Edit data/profile.md (and demo profiles under data/profiles/) from the
      # host — changes are picked up on the next /api/generate call.
      # NOTE: cv_template.md is NOT in here anymore; it ships inside the image
      # at /app/backend/cv_template.md so template edits require a rebuild
      # (`docker compose build`). This matches how it works on Kubernetes,
      # where the template is baked into the image instead of living on the
      # PersistentVolume mounted at /app/data.
      - ./data:/app/data
      # Generated CVs (PDF + .md) persist to the host so you can inspect them
      # and they survive container restarts.
      - ./output:/app/output
    environment:
      # xhtml2pdf is the only backend in the slim image now — setting it
      # explicitly makes the choice obvious. ("auto" would also resolve to
      # xhtml2pdf since WeasyPrint is no longer installed.)
      CV_PDF_BACKEND: xhtml2pdf
      # Clerk auth — read from .env (docker-compose auto-loads ./.env).
      # Leave empty to disable auth and open up the app.
      CLERK_PUBLISHABLE_KEY: "${CLERK_PUBLISHABLE_KEY:-}"
      CLERK_SECRET_KEY: "${CLERK_SECRET_KEY:-}"
    restart: unless-stopped
    # Reuses the HEALTHCHECK baked into the image; exposed here so compose
    # shows the container's health status in `docker ps` / `docker compose ps`.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; r=urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3); sys.exit(0 if r.status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
