apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cv-generator.fullname" . }}
  labels: {{- include "cv-generator.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels: {{- include "cv-generator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations: {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "cv-generator.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cv-generator.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.persistence.enabled .Values.persistence.seedDemoData }}
      initContainers:
        # Seed the PVC with the image's bundled /app/data tree — demo
        # profile markdown files plus any starter content. `cp -rn` is
        # idempotent and never overwrites existing files, so user-created
        # profile JSONs / uploaded pictures persist safely.
        #
        # NOTE: cv_template.md is intentionally NOT seeded here. It lives
        # under /app/backend/cv_template.md (baked into the image), so
        # template edits ship via a normal `docker build` + rollout instead
        # of needing a manual `kubectl cp` onto the PVC.
        - name: seed-data
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "Seeding /data-mount from /app/data (no-clobber)..."
              cp -rn /app/data/. /data-mount/ 2>/dev/null || true
              mkdir -p /data-mount/profiles /data-mount/profile_pictures
              echo "--- contents of /data-mount ---"
              ls -la /data-mount
              echo "--- profiles ---"
              ls -la /data-mount/profiles || true
          volumeMounts:
            - name: data
              mountPath: /data-mount
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext: {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.clerk.enabled }}
          # Clerk keys come from a Kubernetes Secret — see values.yaml for
          # the `kubectl create secret` command that provisions it.
          envFrom:
            - secretRef:
                name: {{ .Values.clerk.existingSecret | required "clerk.existingSecret is required when clerk.enabled is true" }}
          {{- end }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath | quote }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe: {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe: {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" (include "cv-generator.fullname" .)) | quote }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
